# News feeds: Yahoo Finance RSS plus targeted Google News RSS queries.
# (Reuters discontinued public RSS; Google News queries substitute.)
news_feeds:
  - name: Yahoo Finance
    url: https://finance.yahoo.com/news/rssindex
  - name: Google News — viral product
    url: https://news.google.com/rss/search?q=%22viral%22%20product%20sales%20surge&hl=en-US&gl=US&ceid=US:en
  - name: Google News — toy/collectible craze
    url: https://news.google.com/rss/search?q=toy%20OR%20collectible%20craze%20demand&hl=en-US&gl=US&ceid=US:en
  - name: Google News — app downloads surge
    url: https://news.google.com/rss/search?q=app%20downloads%20surge%20chart&hl=en-US&gl=US&ceid=US:en
  - name: Google News — Gen Z trend brand
    url: https://news.google.com/rss/search?q=%22gen%20z%22%20brand%20trend%20spending&hl=en-US&gl=US&ceid=US:en
  - name: Google News — critical minerals chokepoint
    url: https://news.google.com/rss/search?q=critical%20minerals%20OR%20tungsten%20OR%20%22rare%20earth%22%20export%20supply&hl=en-US&gl=US&ceid=US:en
