name: daily-curiosity-run
on:
  schedule:
    - cron: "30 10 * * *"   # ~6:30am ET daily (GitHub cron may drift a few min)
  workflow_dispatch: {}      # manual "Run workflow" button for testing
 
permissions:
  contents: write
 
concurrency:
  group: daily-run
  cancel-in-progress: false
 
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
 
      - run: pip install -r requirements.txt
 
      - name: Run the Curiosity Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          CE_USER_AGENT: ${{ secrets.CE_USER_AGENT }}
          DASHBOARD_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: python -m engine.run
 
      - name: Commit results (history + dashboard)
        run: |
          git config user.name "curiosity-engine[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add data docs
          git commit -m "daily run $(date -u +%F)" || echo "nothing to commit"
          git push
